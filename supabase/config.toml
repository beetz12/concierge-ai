# Supabase Local Development Configuration
# This file is used when running Supabase locally with `supabase start`

# Project ID (set by `supabase link` or manually)
project_id = "dsxuwpluafxyjwrhepsw"

# Ports moved off the 54321-54324 defaults: other local Supabase stacks
# (nexai-jarvis, pframe-monorepo) already bind those on this machine.
[api]
port = 56321
schemas = ["public", "storage"]
extra_search_path = ["public"]
max_rows = 1000

[db]
port = 56322
shadow_port = 56320
major_version = 15

[studio]
port = 56323

[inbucket]
port = 56324

[analytics]
enabled = false

[storage]
file_size_limit = "50MiB"

[auth]
site_url = "http://localhost:3000"
additional_redirect_urls = ["http://localhost:3000"]
jwt_expiry = 3600
enable_signup = true

[auth.email]
enable_signup = true
double_confirm_changes = true
enable_confirmations = false
